<?xml version="1.0" encoding="utf-8"?>
<svg version="1.0" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve">
<defs>
  <style type="text/css">
    .outer-ring { fill: none; stroke: #00e5ff; stroke-width: 3; opacity: 0.6; }
    .inner-ring { fill: none; stroke: #00e5ff; stroke-width: 2; opacity: 0.8; }
    .core-glow { fill: #00e5ff; opacity: 0.3; }
    .core-main { fill: #00e5ff; }
    .arc-cyan { fill: none; stroke: #00e5ff; stroke-width: 8; stroke-linecap: round; }
    .arc-purple { fill: none; stroke: #7c5cff; stroke-width: 8; stroke-linecap: round; }
    .arc-orange { fill: none; stroke: #f59e0b; stroke-width: 6; stroke-linecap: round; opacity: 0.7; }
    .j-letter { fill: #ffffff; font-family: Arial, sans-serif; font-weight: bold; font-size: 120px; }
    .ring-animate { animation: rotate 20s linear infinite; transform-origin: 256px 256px; }
    .pulse-animate { animation: pulse 2s ease-in-out infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
    <stop offset="70%" style="stop-color:#00e5ff;stop-opacity:0.6" />
    <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
  </radialGradient>
</defs>

<!-- Background -->
<rect width="512" height="512" fill="#060a14" rx="64"/>

<!-- Outer decorative rings -->
<circle cx="256" cy="256" r="220" class="outer-ring" style="stroke-dasharray: 20 10;" />
<circle cx="256" cy="256" r="200" class="inner-ring" style="stroke-dasharray: 15 8;" />

<!-- Animated rotating arcs -->
<g class="ring-animate" filter="url(#glow)">
  <circle cx="256" cy="256" r="170" class="arc-cyan" style="stroke-dasharray: 80 450; stroke-dashoffset: 0;" />
  <circle cx="256" cy="256" r="170" class="arc-purple" style="stroke-dasharray: 60 450; stroke-dashoffset: 150;" />
  <circle cx="256" cy="256" r="150" class="arc-orange" style="stroke-dasharray: 40 380; stroke-dashoffset: 100;" />
</g>

<!-- Core glow effect -->
<circle cx="256" cy="256" r="80" fill="url(#coreGradient)" class="pulse-animate" filter="url(#glowStrong)" />

<!-- Inner core circle -->
<circle cx="256" cy="256" r="60" fill="#080e1e" stroke="#00e5ff" stroke-width="2" filter="url(#glow)" />

<!-- JARVIS "J" letter -->
<text x="256" y="290" text-anchor="middle" class="j-letter" filter="url(#glow)">J</text>

<!-- Small tech dots -->
<g fill="#00e5ff" opacity="0.5">
  <circle cx="256" cy="60" r="4" class="pulse-animate" />
  <circle cx="256" cy="452" r="4" class="pulse-animate" style="animation-delay: 0.5s;" />
  <circle cx="60" cy="256" r="4" class="pulse-animate" style="animation-delay: 1s;" />
  <circle cx="452" cy="256" r="4" class="pulse-animate" style="animation-delay: 1.5s;" />
</g>

<!-- Corner tech marks -->
<g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.4">
  <path d="M 80 80 L 80 120 M 80 80 L 120 80" />
  <path d="M 432 80 L 432 120 M 432 80 L 392 80" />
  <path d="M 80 432 L 80 392 M 80 432 L 120 432" />
  <path d="M 432 432 L 432 392 M 432 432 L 392 432" />
</g>

<!-- JARVIS text -->
<text x="256" y="380" text-anchor="middle" fill="#00e5ff" font-family="Arial, sans-serif" font-weight="bold" font-size="24" letter-spacing="12" filter="url(#glow)">JARVIS</text>
<text x="256" y="405" text-anchor="middle" fill="#90a8cc" font-family="Arial, sans-serif" font-size="10" letter-spacing="4" opacity="0.6">AI ASSISTANT</text>

</svg>
